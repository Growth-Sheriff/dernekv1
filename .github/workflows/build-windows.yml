name: Build Windows Installer

# Windows .exe (NSIS) + .msi kurulum dosyalarını üretir.
# İki tetikleme yolu:
#   1) Actions sekmesi -> "Build Windows Installer" -> Run workflow  (manuel, artifact olarak iner)
#   2) v ile başlayan bir tag push et (ör. v3.0.0) -> otomatik GitHub Release oluşur, installer'lar eklenir

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app (Windows .exe + .msi)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('BADER {0}', github.ref_name) || '' }}
          releaseBody: "BADER Windows kurulum dosyaları. .exe (NSIS) veya .msi ile kurabilirsiniz."
          releaseDraft: false
          prerelease: false

      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BADER-Windows-Installers
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
